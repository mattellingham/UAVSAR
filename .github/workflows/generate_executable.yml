name: 'publish'

on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: install LLVM and pkg-config
        run: choco install llvm pkgconfiglite -y

      - name: setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: buildenv
          channels: conda-forge

      - name: install GDAL, proj and sqlite via conda
        shell: pwsh
        run: conda install -y "gdal=3.9" proj sqlite -c conda-forge

      - name: set environment variables
        shell: pwsh
        run: |
          $libDir = "$env:CONDA\envs\buildenv\Library"
          Write-Host "Lib dir: $libDir"
          # Fix gdal lib name if needed
          if ((Test-Path "$libDir\lib\gdal.lib") -and (-not (Test-Path "$libDir\lib\gdal_i.lib"))) {
            Copy-Item "$libDir\lib\gdal.lib" "$libDir\lib\gdal_i.lib"
            Write-Host "Copied gdal.lib -> gdal_i.lib"
          }
          Write-Host "GDAL libs:"; dir "$libDir\lib\gdal*"
          Write-Host "PROJ libs:"; dir "$libDir\lib\proj*"
          # Set PKG_CONFIG_PATH so proj-sys can find pre-built proj via pkg-config
          $pkgConfigPath = "$libDir\lib\pkgconfig"
          Write-Host "PKG_CONFIG_PATH: $pkgConfigPath"
          if (Test-Path $pkgConfigPath) {
            Write-Host "pkg-config files:"; dir $pkgConfigPath
          } else {
            Write-Host "WARNING: pkgconfig dir not found at $pkgConfigPath"
          }
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "GDAL_HOME=$libDir" >> $env:GITHUB_ENV
          echo "GDAL_LIB_DIR=$libDir\lib" >> $env:GITHUB_ENV
          echo "GDAL_INCLUDE_DIR=$libDir\include" >> $env:GITHUB_ENV
          echo "GDAL_VERSION=3.9.0" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$pkgConfigPath" >> $env:GITHUB_ENV
          echo "PROJ_LIB=$libDir\share\proj" >> $env:GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$libDir" >> $env:GITHUB_ENV
          echo "$libDir\bin" >> $env:GITHUB_PATH

      - name: copy runtime DLLs for bundling
        shell: pwsh
        run: |
          $binDir = "$env:CONDA\envs\buildenv\Library\bin"
          New-Item -ItemType Directory -Force -Path src-tauri\dlls
          New-Item -ItemType Directory -Force -Path src-tauri\resources\proj
          Copy-Item "$binDir\*.dll" src-tauri\dlls\ -Force
          Copy-Item "$env:CONDA\envs\buildenv\Library\share\proj\*" src-tauri\resources\proj\ -Recurse -Force
          Write-Host "Copied DLLs:"; (dir src-tauri\dlls).Count
      
      - name: list proj DLLs
        shell: pwsh
        run: dir "$env:CONDA\envs\buildenv\Library\bin\proj*.dll"
        
      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
