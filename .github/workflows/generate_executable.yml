name: 'publish'

on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: install LLVM
        run: choco install llvm -y

      - name: cache GISInternals
        uses: actions/cache@v4
        id: gisinternals-cache
        with:
          path: C:\gdal
          key: gisinternals-gdal-3-9-0-v1

      - name: download pre-built GDAL from GISInternals
        if: steps.gisinternals-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o gdal-libs.zip https://download.gisinternals.com/sdk/downloads/release-1930-x64-gdal-3-9-0-mapserver-8-2-0-libs.zip
          curl -L -o gdal-bin.zip https://download.gisinternals.com/sdk/downloads/release-1930-x64-gdal-3-9-0-mapserver-8-2-0.zip
          Expand-Archive -Path gdal-libs.zip -DestinationPath C:\gdal
          Expand-Archive -Path gdal-bin.zip -DestinationPath C:\gdal

      - name: set environment variables
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "GDAL_HOME=C:\gdal" >> $env:GITHUB_ENV
          echo "GDAL_LIB_DIR=C:\gdal\lib" >> $env:GITHUB_ENV
          echo "GDAL_INCLUDE_DIR=C:\gdal\include" >> $env:GITHUB_ENV
          echo "PROJ_NO_PKG_CONFIG=1" >> $env:GITHUB_ENV
          echo "PROJ_ROOT=C:\gdal" >> $env:GITHUB_ENV
          echo "PROJ_LIB_DIR=C:\gdal\lib" >> $env:GITHUB_ENV
          echo "PROJ_INCLUDE_DIR=C:\gdal\include" >> $env:GITHUB_ENV
          echo "PROJ_LIB=C:\gdal\bin\proj9\share" >> $env:GITHUB_ENV
          echo "SQLITE3_LIB_DIR=C:\gdal\lib" >> $env:GITHUB_ENV
          echo "C:\gdal\bin" >> $env:GITHUB_PATH

      - name: list gdal lib directory for debugging
        run: dir C:\gdal\lib

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
