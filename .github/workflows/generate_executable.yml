name: 'publish'

on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: install LLVM, cmake and sqlite3
        run: choco install llvm cmake sqlite -y

      - name: setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: buildenv
          channels: conda-forge

      - name: install GDAL via conda
        shell: pwsh
        run: conda install -y "gdal=3.9" -c conda-forge

      - name: set environment variables
        shell: pwsh
        run: |
          $libDir = "$env:CONDA\envs\buildenv\Library"
          Write-Host "Lib dir: $libDir"
          # Fix gdal lib name if needed
          if ((Test-Path "$libDir\lib\gdal.lib") -and (-not (Test-Path "$libDir\lib\gdal_i.lib"))) {
            Copy-Item "$libDir\lib\gdal.lib" "$libDir\lib\gdal_i.lib"
          }
          Write-Host "GDAL libs:"; dir "$libDir\lib\gdal*"
          Write-Host "SQLite libs:"; dir "C:\ProgramData\chocolatey\lib\SQLite\tools\*"
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "GDAL_HOME=$libDir" >> $env:GITHUB_ENV
          echo "GDAL_LIB_DIR=$libDir\lib" >> $env:GITHUB_ENV
          echo "GDAL_INCLUDE_DIR=$libDir\include" >> $env:GITHUB_ENV
          echo "GDAL_VERSION=3.9.0" >> $env:GITHUB_ENV
          echo "PROJ_LIB=$libDir\share\proj" >> $env:GITHUB_ENV
          echo "PROJ_NO_PKG_CONFIG=1" >> $env:GITHUB_ENV
          echo "SQLITE3_LIB_DIR=C:\ProgramData\chocolatey\lib\SQLite\tools" >> $env:GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=C:\ProgramData\chocolatey\lib\SQLite\tools" >> $env:GITHUB_ENV
          echo "$libDir\bin" >> $env:GITHUB_PATH

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
