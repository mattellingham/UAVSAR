name: 'publish'

on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: install LLVM
        run: choco install llvm -y

      - name: setup conda with GDAL
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: buildenv
          channels: conda-forge

      - name: install GDAL and proj via conda
        shell: pwsh
        run: |
          conda activate buildenv
          conda install -y gdal proj sqlite -c conda-forge

      - name: set environment variables
        shell: pwsh
        run: |
          $condaEnv = "C:\Miniconda\envs\buildenv"
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "GDAL_HOME=$condaEnv\Library" >> $env:GITHUB_ENV
          echo "GDAL_LIB_DIR=$condaEnv\Library\lib" >> $env:GITHUB_ENV
          echo "GDAL_INCLUDE_DIR=$condaEnv\Library\include" >> $env:GITHUB_ENV
          echo "PROJ_ROOT=$condaEnv\Library" >> $env:GITHUB_ENV
          echo "PROJ_NO_PKG_CONFIG=1" >> $env:GITHUB_ENV
          echo "PROJ_LIB=$condaEnv\Library\share\proj" >> $env:GITHUB_ENV
          echo "PROJ_LIB_DIR=$condaEnv\Library\lib" >> $env:GITHUB_ENV
          echo "PROJ_INCLUDE_DIR=$condaEnv\Library\include" >> $env:GITHUB_ENV
          echo "SQLITE3_LIB_DIR=$condaEnv\Library\lib" >> $env:GITHUB_ENV
          echo "$condaEnv\Library\bin" >> $env:GITHUB_PATH

      - name: fix gdal lib name
        shell: pwsh
        run: |
          $condaEnv = "C:\Miniconda\envs\buildenv"
          $src = "$condaEnv\Library\lib\gdal.lib"
          $dst = "$condaEnv\Library\lib\gdal_i.lib"
          if ((Test-Path $src) -and (-not (Test-Path $dst))) {
            Copy-Item $src $dst
          }
          dir "$condaEnv\Library\lib\gdal*"

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
